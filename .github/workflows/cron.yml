name: Daily pipeline (7 AM ET)

# Triggers the existing Fly machine in econ-data-cron at 7 AM Eastern.
# Two schedules cover both DST states; the runtime guard picks the matching one.
# Match by (scheduled cron expression × current DST), not by current hour —
# GitHub Actions cron is regularly delayed 30–90 minutes, which would push the
# current ET hour past 07 and cause a false skip.

on:
  schedule:
    - cron: '0 11 * * *'  # 7 AM EDT (DST)
    - cron: '0 12 * * *'  # 7 AM EST (standard)
  workflow_dispatch:       # manual trigger from the Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Check DST schedule match
        id: dst
        if: github.event_name == 'schedule'
        run: |
          TZ_NAME=$(TZ=America/New_York date +%Z)
          SCHEDULE='${{ github.event.schedule }}'
          SHOULD_RUN=true
          if [ "$SCHEDULE" = "0 11 * * *" ] && [ "$TZ_NAME" != "EDT" ]; then
            echo "EDT-scheduled trigger fired but ET is currently ${TZ_NAME}. Skipping."
            SHOULD_RUN=false
          fi
          if [ "$SCHEDULE" = "0 12 * * *" ] && [ "$TZ_NAME" != "EST" ]; then
            echo "EST-scheduled trigger fired but ET is currently ${TZ_NAME}. Skipping."
            SHOULD_RUN=false
          fi
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"

      - name: Start Fly machine
        if: github.event_name == 'workflow_dispatch' || steps.dst.outputs.should_run == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          MACHINE_ID=$(flyctl machine list -a econ-data-cron --json \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          echo "Starting machine $MACHINE_ID"
          flyctl machine start "$MACHINE_ID" -a econ-data-cron
