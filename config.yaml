# ---------------------------------------------------------------
# Econ Data Configuration
# Add/remove series and groups here. Run `python run.py` to fetch
# new additions, then `python export.py` to export.
# ---------------------------------------------------------------

# Standalone series (not part of a group)
series: []

# Groups of related series
groups:
  cpi:
    name: "CPI - Consumer Price Index (BLS, SA)"
    signals: minimal
    series:
      # Headline and core
      - id: CPIAUCSL
        name: "CPI All Items (Headline)"
      - id: CPILFESL
        name: "CPI Less Food & Energy (Core)"
      # Components
      - id: CPIFABSL
        name: "CPI Food & Beverages"
      - id: CPIENGSL
        name: "CPI Energy"
      - id: CUSR0000SAH1
        name: "CPI Shelter"
      - id: CPIMEDSL
        name: "CPI Medical Care"
      - id: CPITRNSL
        name: "CPI Transportation"
      - id: CPIAPPSL
        name: "CPI Apparel"
      - id: CPIEDUSL
        name: "CPI Education & Communication"

  cpi-metro:
    name: "CPI by Metro Area (BLS)"
    signals: minimal
    series:
      # --- Available via FRED ---
      - id: CUURA101SA0
        name: "CPI - New York"
      - id: CUURA102SA0
        name: "CPI - Philadelphia"
      - id: CUURA103SA0
        name: "CPI - Boston"
      - id: CUURA207SA0
        name: "CPI - Chicago"
      - id: CUURA208SA0
        name: "CPI - Detroit"
      - id: CUURA316SA0
        name: "CPI - Dallas"
      - id: CUURA318SA0
        name: "CPI - Houston"
      - id: CUURA319SA0
        name: "CPI - Atlanta"
      - id: CUURA320SA0
        name: "CPI - Miami"
      - id: CUURA422SA0
        name: "CPI - San Francisco"
      - id: CUURA423SA0
        name: "CPI - Seattle"
      - id: CUURA400SA0
        name: "CPI - West Region (Size Class A)"
      # --- BLS only (discontinued in FRED after 2018 geo restructuring) ---
      - id: BLS_CPI_LA
        name: "CPI - Los Angeles"
        bls_id: CUURS49ASA0
      - id: BLS_CPI_DENVER
        name: "CPI - Denver"
        bls_id: CUURS12ASA0
      - id: BLS_CPI_MINNEAPOLIS
        name: "CPI - Minneapolis"
        bls_id: CUURS23ASA0
      - id: BLS_CPI_MILWAUKEE
        name: "CPI - Milwaukee"
        bls_id: CUURS23BSA0
      - id: BLS_CPI_CINCINNATI
        name: "CPI - Cincinnati"
        bls_id: CUURS24ASA0
      - id: BLS_CPI_STLOUIS
        name: "CPI - St. Louis"
        bls_id: CUURS24BSA0
      - id: BLS_CPI_DC
        name: "CPI - Washington DC"
        bls_id: CUURS35ASA0
      - id: BLS_CPI_BALTIMORE
        name: "CPI - Baltimore"
        bls_id: CUURS35BSA0
      - id: BLS_CPI_TAMPA
        name: "CPI - Tampa"
        bls_id: CUURS35DSA0
      - id: BLS_CPI_PHOENIX
        name: "CPI - Phoenix"
        bls_id: CUURS48BSA0
      - id: BLS_CPI_SANDIEGO
        name: "CPI - San Diego"
        bls_id: CUURS49DSA0
      - id: BLS_CPI_PORTLAND
        name: "CPI - Portland"
        bls_id: CUURS49ESA0
      - id: BLS_CPI_RIVERSIDE
        name: "CPI - Riverside"
        bls_id: CUURS49FSA0
      - id: BLS_CPI_HAWAII
        name: "CPI - Urban Hawaii"
        bls_id: CUURS12BSA0
      - id: BLS_CPI_ALASKA
        name: "CPI - Urban Alaska"
        bls_id: CUURS48ASA0

  pce:
    name: "PCE Price Index (Fed's Preferred Inflation Measure)"
    signals: minimal
    series:
      - id: PCEPI
        name: "PCE Price Index"
      - id: PCEPILFE
        name: "Core PCE (Less Food & Energy)"

  inflation-expectations:
    name: "Inflation Expectations - Market-Based (Treasury Breakevens)"
    signals: minimal
    series:
      - id: T5YIE
        name: "5-Year Breakeven Inflation Rate"
        units: percent
      - id: T10YIE
        name: "10-Year Breakeven Inflation Rate"
        units: percent
      - id: T5YIFR
        name: "5-Year, 5-Year Forward Inflation Expectation Rate"
        units: percent

  inflation-expectations-survey:
    name: "Inflation Expectations - Cleveland Fed Model"
    signals: minimal
    series:
      - id: EXPINF1YR
        name: "1-Year Expected Inflation"
        units: percent
      - id: EXPINF5YR
        name: "5-Year Expected Inflation"
        units: percent
      - id: EXPINF10YR
        name: "10-Year Expected Inflation"
        units: percent

  ppi:
    name: "Producer Price Index (BLS, SA)"
    signals: minimal
    series:
      - id: WPSFD49207
        name: "PPI Final Demand - Finished Goods"
      - id: WPSFD4131
        name: "PPI Final Demand - Less Food & Energy"

  labor-headlines:
    name: "Labor Market Headlines"
    signals: minimal
    series:
      # Employment situation (BLS, first Friday)
      - id: UNRATE
        name: "Unemployment Rate"
        units: percent
        inverted: true
      - id: U6RATE
        name: "U-6 Underemployment Rate"
        units: percent
        inverted: true
      - id: PAYEMS
        name: "Total Nonfarm Payrolls (000s)"
      - id: CE16OV
        name: "CPS Employment Level (000s)"
      - id: CES0500000003
        name: "Average Hourly Earnings"
      # JOLTS headlines
      - id: JTSJOL
        name: "JOLTS Job Openings"
      - id: JTSHIR
        name: "JOLTS Hires Rate"
        units: percent
      - id: JTSQUR
        name: "JOLTS Quits Rate"
        units: percent
      # Claims
      - id: ICSA
        name: "Initial Jobless Claims"
        inverted: true
      - id: IC4WSA
        name: "Initial Claims 4-Week Avg"
        inverted: true
      # Duration (housing-relevant: distressed borrower risk)
      - id: UEMP27OV
        name: "Unemployed 27+ Weeks (000s)"
        inverted: true
      - id: UEMPMED
        name: "Median Duration of Unemployment (Weeks)"
        inverted: true

  income:
    name: "Household & Personal Income"
    series:
      - id: MEHOINUSA646N
        name: "Median Household Income (current $)"
      - id: MEHOINUSA672N
        name: "Real Median Household Income (2024 $)"
      - id: CES0500000003
        name: "Average Hourly Earnings (Total Private)"
      - id: A229RX0
        name: "Real Disposable Personal Income Per Capita"

  affordability:
    name: "Housing Affordability"
    source: calculated
    series:
      - id: PRICE_TO_INCOME
        name: "Median Existing-Home Price / Median Household Income"

  wage-growth:
    name: "Atlanta Fed Wage Growth Tracker"
    signals: minimal
    series:
      - id: FRBATLWGT3MMAUMHWGO
        name: "Wage Growth 3-Month MA (Headline)"
        units: percent
      - id: FRBATLWGTUMHWGO
        name: "Wage Growth Monthly"
        units: percent
      - id: FRBATLWGT12MMUMHGO
        name: "Wage Growth 12-Month MA"
        units: percent

  productivity:
    name: "Productivity (BLS, Quarterly)"
    signals: minimal
    series:
      - id: OPHNFB
        name: "Output Per Hour - Nonfarm Business"
      - id: PRS85006092
        name: "Unit Labor Costs - Nonfarm Business"

  labor-detail:
    name: "Labor Market Detail"
    signals: minimal
    series:
      # U-rates
      - id: U1RATE
        name: "U-1 Unemployed 15+ Weeks as % of Labor Force"
        units: percent
        inverted: true
      - id: U2RATE
        name: "U-2 Job Losers as % of Labor Force"
        units: percent
        inverted: true
      - id: U4RATE
        name: "U-4 + Discouraged Workers"
        units: percent
        inverted: true
      - id: U5RATE
        name: "U-5 + Other Marginally Attached"
        units: percent
        inverted: true
      # Unemployment duration & levels
      - id: UEMPLT5
        name: "Unemployed Less Than 5 Weeks (000s)"
        inverted: true
      - id: UEMP5TO14
        name: "Unemployed 5-14 Weeks (000s)"
        inverted: true
      - id: UEMP15T26
        name: "Unemployed 15-26 Weeks (000s)"
        inverted: true
      - id: UNEMPLOY
        name: "Total Unemployed (000s)"
        inverted: true
      - id: UEMPMEAN
        name: "Average Duration of Unemployment (Weeks)"
        inverted: true
      # Labor force
      - id: CLF16OV
        name: "Civilian Labor Force Level (000s)"
      - id: CIVPART
        name: "Labor Force Participation Rate"
        units: percent
      - id: EMRATIO
        name: "Employment-Population Ratio"
        units: percent
      - id: AWHAETP
        name: "Average Weekly Hours"
      - id: AHETPI
        name: "Average Hourly Earnings - Production Workers"
      # JOLTS detail
      - id: JTSHIL
        name: "Hires: Total Nonfarm"
      - id: JTSTSL
        name: "Total Separations: Total Nonfarm"
        inverted: true
      - id: JTSQUL
        name: "Quits: Total Nonfarm"
      - id: JTSLDL
        name: "Layoffs and Discharges: Total Nonfarm"
        inverted: true
      - id: JTSJOR
        name: "Job Openings Rate"
        units: percent
      - id: JTSTSR
        name: "Total Separations Rate"
        units: percent
        inverted: true
      - id: JTSLDR
        name: "Layoffs and Discharges Rate"
        units: percent
        inverted: true
      # Labor quality
      - id: LNS12600000
        name: "Multiple Jobholders (000s)"
      - id: LNS12026619
        name: "Multiple Jobholders as % of Employed"
        units: percent
      - id: LNS12032194
        name: "Part-Time for Economic Reasons (000s)"
      - id: CES0500000017
        name: "Aggregate Weekly Payrolls Index"
      - id: TEMPHELPS
        name: "Temp Help Services Employment (000s)"
      # Continuing claims
      - id: CCSA
        name: "Continuing Claims"
        inverted: true
      - id: CC4WSA
        name: "Continuing Claims 4-Week Avg"
        inverted: true
      - id: IURSA
        name: "Insured Unemployment Rate"
        units: percent
        inverted: true

